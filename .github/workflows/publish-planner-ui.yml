# Publishes @retiregolden/planner-ui to npm.
#
# Trigger by pushing a tag `planner-ui-v<version>` (must match the version in
# packages/planner-ui/package.json), or manually via workflow_dispatch — the
# manual run defaults to `npm publish --dry-run` so the pipeline can be
# rehearsed without releasing.
#
# Requires the `NPM_TOKEN` repository secret: a granular npm automation token
# for the @retiregolden org with publish rights on @retiregolden/planner-ui.

name: Publish planner-ui package

on:
  push:
    tags: ['planner-ui-v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Use npm publish --dry-run (no release)
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  id-token: write # npm --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # This workflow holds npm publish rights, so its actions are pinned to
      # full commit SHAs (tags are mutable and can be repointed upstream).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/planner-ui-v')
        run: |
          tag="${GITHUB_REF_NAME#planner-ui-v}"
          version="$(node -p "require('./packages/planner-ui/package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "Tag planner-ui-v$tag does not match packages/planner-ui version $version" >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint -w @retiregolden/planner-ui

      # `build` is a type-check (`tsc -b`): the package publishes its
      # TypeScript source verbatim, so there is no dist emit — but the check
      # also builds the engine project reference the tests compile against.
      - name: Type check
        run: npm run build -w @retiregolden/planner-ui

      - name: Test
        run: npm run test -w @retiregolden/planner-ui

      # Prove the published surface from a scratch Vite consumer installed
      # off the packed tarball (registry engine, no workspace symlink): the
      # exports map resolves, the source compiles under a consumer's Vite,
      # and the dep-internal worker chunks + HiGHS wasm are emitted.
      - name: Smoke test the packed artifact
        run: node packages/planner-ui/scripts/pack-smoke.mjs

      - name: Publish to npm
        working-directory: packages/planner-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          extra=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN" != "false" ]; then
            extra="--dry-run"
          fi
          npm publish --access public --provenance $extra
