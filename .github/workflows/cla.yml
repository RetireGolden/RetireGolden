# CLA Assistant Lite — enforces the Individual CLA (CLA.md) on every PR.
# First-time contributors get a bot comment; they sign by replying with the
# acceptance phrase (see CLA.md §9). Signatures are stored in the private
# RetireGolden/cla-signatures repo via the CLA_PAT secret (a fine-grained PAT
# with Contents read/write on that repo).
# Corporate CLAs (CLA-CORPORATE.md) are executed out-of-band; covered
# contributors still sign the Individual CLA here.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  # pull_request_target is safe here: this workflow never checks out or runs
  # PR code — it only reads the event and writes comments/statuses.
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant Lite
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          remote-organization-name: RetireGolden
          remote-repository-name: cla-signatures
          path-to-signatures: signatures/v1/cla.json
          path-to-document: https://github.com/RetireGolden/RetireGolden/blob/main/CLA.md
          branch: main
          # Maintainers and bots are exempt from signing.
          allowlist: FlyOverCoderKY,*[bot]
          custom-notsigned-prcomment: >
            Thank you for your contribution to RetireGolden! Before we can merge,
            we need you to sign our
            [Individual Contributor License Agreement](https://github.com/RetireGolden/RetireGolden/blob/main/CLA.md)
            (a one-time step — you keep the copyright to your work; see
            [CONTRIBUTING.md](https://github.com/RetireGolden/RetireGolden/blob/main/CONTRIBUTING.md)
            for why we require it). If your employer may own rights in your
            contribution, your employer also needs a signed
            [Corporate CLA](https://github.com/RetireGolden/RetireGolden/blob/main/CLA-CORPORATE.md)
            on file — email info@retiregolden.org. To sign, post the comment
            below.
