# Azure Static Web Apps CI/CD
# See DOCS/operations/ci-cd-and-deploy.md

name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]
    branches: [ main ]

# A new push to the same PR cancels the still-running pipeline for the
# previous commit. Pushes to main are never cancelled, and neither does a
# `labeled` event for anything other than `run-ci` — its jobs all skip
# (see the gate below), so it must not kill a live pipeline.
concurrency:
  group: swa-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && (github.event.action != 'labeled' || github.event.label.name == 'run-ci') }}

jobs:
  # --- Code Quality Jobs ---
  # On PRs the full pipeline is gated behind the `run-ci` label so review-bot
  # rounds don't burn Actions minutes: apply the label once the PR is ready
  # for CI and it runs immediately (labeled event) and on every later push.
  # The `action != 'labeled' || label.name == 'run-ci'` clause keeps *other*
  # label additions from re-running the pipeline on an already-labeled PR.
  # Skipped required checks report as "skipped", which satisfies the Main
  # Guard ruleset — apply `run-ci` before merging so real results gate main.
  lint:
    if: github.event_name == 'push' || (github.event.action != 'closed' && (github.event.action != 'labeled' || github.event.label.name == 'run-ci') && contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (engine package + app)
        run: npm run lint

  test:
    if: github.event_name == 'push' || (github.event.action != 'closed' && (github.event.action != 'labeled' || github.event.label.name == 'run-ci') && contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test (engine package + app, with coverage thresholds)
        run: npm run test:coverage

  e2e:
    if: github.event_name == 'push' || (github.event.action != 'closed' && (github.event.action != 'labeled' || github.event.label.name == 'run-ci') && contains(github.event.pull_request.labels.*.name, 'run-ci'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        working-directory: app
        run: npx playwright install --with-deps chromium
      - name: Browser layout tests
        working-directory: app
        run: npm run test:e2e

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check + Build (engine package, then app)
        run: npm run build
      # The dev/test loop aliases the engine package to its TS source, so this
      # is the only per-PR check that the published exports map + dist emit
      # actually resolve for an external consumer.
      - name: Smoke test the packed engine artifact
        run: node packages/engine/scripts/pack-smoke.mjs
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: app/dist
          retention-days: 1

  # --- Deploy jobs ---
  deploy:
    # Fork PRs never deploy: GitHub withholds secrets from fork-triggered
    # pull_request runs, so the SWA token would be empty and the job would
    # fail anyway. Same-repo PRs still get preview environments.
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed' && !github.event.pull_request.head.repo.fork)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      pull-requests: write
    # Expose the deployed URL (production on push, PR preview env on pull_request)
    # so the DAST job can scan it.
    outputs:
      preview_url: ${{ steps.builddeploy.outputs.static_web_app_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: app/dist

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: app/dist
          api_location: ''
          output_location: ''

  # --- Security: DAST ---
  dast:
    name: ZAP DAST
    # Scan the freshly deployed PR preview environment with OWASP ZAP.
    # PR-only (skips push-to-main / production) and never runs on PR close.
    # Runs after deploy and cannot affect or roll back the deployment.
    #
    # The nested `ZAP DAST / ZAP Baseline` check is required by the Main Guard
    # ruleset, and GitHub never creates it when this caller job is skipped —
    # it would sit "Expected" forever and block unlabeled PRs. So on PRs
    # without `run-ci` this job still invokes the reusable workflow (deploy
    # was skipped, so target_url is empty) and the scan job inside zap.yml
    # skips itself, which reports the nested check as "skipped" and satisfies
    # the ruleset. With `run-ci` present the job runs only after a successful
    # deploy, so lint/test/e2e/deploy failures still block the merge by
    # leaving the required check unreported. Fork PRs take the same empty-URL
    # path (deploy is skipped for forks, so there is no environment to scan).
    if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.action != 'closed' && (needs.deploy.result == 'success' || !contains(github.event.pull_request.labels.*.name, 'run-ci') || github.event.pull_request.head.repo.fork) }}
    needs: [deploy]
    uses: ./.github/workflows/zap.yml
    permissions:
      contents: read
    with:
      target_url: ${{ needs.deploy.outputs.preview_url }}

  close_pull_request:
    # Forks never deployed a preview environment, so there is nothing to close
    # (and the SWA token is unavailable on fork-triggered runs regardless).
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
