# Semgrep SAST — static analysis on every push / PR to main.
# Deliberately NOT gated behind the `run-ci` label (unlike the main CI/CD
# workflow): the scan is cheap, and it is a Main Guard required check — keeping
# it always-on means every PR gets a real SAST result rather than a skipped one.
# Purely open-source local scan using the p/default ruleset (no account or token required).
# Reports ALL findings (artifact + code scanning), but gates the build only on
# high-severity (ERROR) findings — low/medium issues are surfaced, never blocking.
name: Semgrep SAST

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A new push to the same PR cancels the still-running scan for the previous
# commit. Pushes to main are never cancelled.
concurrency:
  group: semgrep-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read          # checkout
  security-events: write  # upload SARIF to the Security tab (Code Scanning)

jobs:
  semgrep:
    name: Scan (p/default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install Semgrep CLI
        run: python -m pip install --upgrade semgrep

      - name: Semgrep scan
        # `semgrep scan` exits 0 even when findings exist (unlike `--error`),
        # so a low-severity hit will not break the build. --metrics=off keeps
        # the scan fully local with no telemetry.
        run: semgrep scan --config=p/default --sarif --output=semgrep.sarif --metrics=off

      - name: Upload SARIF as build artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 7

      - name: Publish results to GitHub code scanning
        # Surfaces findings as PR annotations + the Security tab.
        # continue-on-error keeps the pipeline green if Code Scanning is not
        # available (e.g. a private repo without GitHub Advanced Security).
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Gate — fail only on high-severity (ERROR) findings
        # Runs after reporting, so the artifact + code scanning upload above always
        # happen first. Re-scans scoped to ERROR severity; --error makes the job
        # (and therefore the check) fail ONLY when a high-severity finding exists.
        # WARNING/INFO findings remain visible in the report but do not block.
        run: semgrep scan --config=p/default --severity=ERROR --error --metrics=off
