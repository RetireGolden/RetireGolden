name: Owl Parity Oracle

on:
  workflow_dispatch:
    inputs:
      strict:
        description: Fail if Owl cannot be installed or any fixture is missing
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  owl-parity:
    name: Run Owl parity harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Run Owl parity
        working-directory: app
        env:
          STRICT: ${{ inputs.strict }}
        run: |
          args=(--install-owl)
          if [ "$STRICT" = "true" ]; then
            args+=(--strict-owl)
          fi
          npm run owl-parity -- "${args[@]}"

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: owl-parity
          path: app/artifacts/owl-parity
          retention-days: 14
