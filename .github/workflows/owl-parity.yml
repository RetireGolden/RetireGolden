name: Owl Parity Oracle

on:
  workflow_dispatch:
    inputs:
      strict:
        description: Fail if Owl cannot be installed or any fixture is missing
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  owl-parity:
    name: Run Owl parity harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Run Owl parity
        working-directory: app
        env:
          STRICT: ${{ inputs.strict }}
        run: |
          args=(--install-owl)
          if [ "$STRICT" = "true" ]; then
            args+=(--strict-owl)
          fi
          npm run owl-parity -- "${args[@]}"

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: owl-parity
          path: app/artifacts/owl-parity
          retention-days: 14
