# Publishes @retiregolden/engine to npm.
#
# Trigger by pushing a tag `engine-v<version>` (must match the version in
# packages/engine/package.json), or manually via workflow_dispatch — the
# manual run defaults to `npm publish --dry-run` so the pipeline can be
# rehearsed without releasing.
#
# Publishes via npm Trusted Publishing (OIDC): the @retiregolden/engine package
# on npmjs.com is configured with a trusted publisher pinned to this repo, this
# workflow filename, and the `npm-publish` environment, so no long-lived token
# is needed. This requires npm >= 11.5.1, which is newer than the npm bundled
# with Node 22 — hence the explicit `npm install -g npm@latest` step below.
# There is no NPM_TOKEN: token-based publishing has been retired in favour of OIDC.
#
# The publish job runs in the `npm-publish` environment, which requires manual
# approval from a reviewer before any release. Its deployment branch policy
# allows the tag pattern `engine-v*` plus the `main` branch; `main` is permitted
# only so dry-runs can be dispatched, and the `guard` job below is what keeps a
# dispatch from ever becoming a real publish.

name: Publish engine package

on:
  push:
    tags: ['engine-v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Use npm publish --dry-run (no release)
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  id-token: write # OIDC trusted-publishing auth + provenance

jobs:
  # Real publishes must originate from an `engine-v*` tag push, because the tag
  # is what triggers the version-consistency check below. A manual dispatch
  # skips that check, so dispatch is dry-run only. This guard deliberately lives
  # in its own ungated job: the `npm-publish` environment pauses `publish` for
  # approval before any of its steps run, so a guard inside that job would only
  # fire after a reviewer had already approved the deployment.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-dry-run manual dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false'
        run: |
          echo "Manual dispatch is dry-run only. To publish for real, push a tag engine-v<version> matching packages/engine/package.json." >&2
          exit 1

  publish:
    runs-on: ubuntu-latest
    needs: guard
    environment: npm-publish
    steps:
      # This workflow holds npm publish rights, so its actions are pinned to
      # full commit SHAs (tags are mutable and can be repointed upstream).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      # actions/setup-node writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
      # into the generated npmrc. With no NODE_AUTH_TOKEN set (the OIDC state),
      # npm reads that as a configured credential and skips the OIDC trusted-
      # publishing exchange, so the publish fails to authenticate. Strip the line
      # so npm sees no credentials and uses OIDC. See actions/setup-node#1551.
      - name: Remove npm auth placeholder so OIDC is used
        run: |
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          fi

      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      # Pin to major 11 so a future npm major can't silently change publish
      # semantics — 11.5.1+ is all trusted publishing needs.
      - name: Upgrade npm for OIDC support
        run: npm install -g 'npm@^11.5.1'

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/engine-v')
        run: |
          tag="${GITHUB_REF_NAME#engine-v}"
          version="$(node -p "require('./packages/engine/package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "Tag engine-v$tag does not match packages/engine version $version" >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint -w @retiregolden/engine

      - name: Build
        run: npm run build -w @retiregolden/engine

      - name: Test
        run: npm run test -w @retiregolden/engine

      # Prove the published surface (exports map + emitted dist) from plain
      # Node ESM, the way an external consumer will use it — the workspace
      # dev loop aliases the package to its TS source and never exercises it.
      - name: Smoke test the packed artifact
        run: node packages/engine/scripts/pack-smoke.mjs

      - name: Publish to npm
        working-directory: packages/engine
        # No NODE_AUTH_TOKEN: auth is via OIDC trusted publishing. `id-token:
        # write` (set at the top) lets npm exchange a short-lived OIDC token for
        # publish credentials, and provenance is generated automatically.
        env:
          EVENT_NAME: ${{ github.event_name }}
        # Belt-and-braces: any workflow_dispatch publishes with --dry-run, no
        # matter what the dry_run input says. The `guard` job already rejects a
        # dispatch with dry_run=false, but even if that guard is removed this
        # step still cannot make a real release from a dispatch. Real publishes
        # come only from an `engine-v*` tag push (event_name = push), which is
        # what runs the tag/package.json version check above.
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public --provenance
          fi
